<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<title>operacje na ułamkach</title>

<style>
body{
    background:#ffa2b7;
    color:white;
    margin: 10px;;
    font-family:Arial, sans-serif;
    text-align:center;
}
header{
    background:#54053a;
    padding:30px;
    font-size:35px;
    font-weight:bold;
}
.container{
    gap:30px;
    padding:40px 25px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.box{
    background:#e8c2db;
    padding:25px;
    border-radius:15px;
    width:320px;
}
input{
    width:55px;
    height:25px;
    font-size:20px;
    border-radius:5px;
    text-align:center;
    border:80px;
}
button{
    background:#742356;
    color:white;
    margin-top:5px;
    padding:10px 20px;
    font-size:15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    transition:0.1s;
}
button:hover{
    background:#c989ad;
    transform:scale(1.05);
}
.fraction{
    display:inline-block;
    text-align:center;
    margin:0px;
}
.fraction span{
    display:block;
}
.line{
    border-top:3.5px solid white;
    width:55px;
    margin:2.5px;
}
.result{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
@media(max-width:700px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
<body>

<header>operacje na ułamkach</header>

<div class="container">


<div class="box">
<h2>skracanie ułamków</h2>

<div class="fraction">
<input id="num1"><span class="line"></span>
<input id="den1">
</div>
<br>
<button onclick="short()">skróć</button>

<div class="result">
<div class="fraction">
<span id="wynikNum"></span>
<span class="line"></span>
<span id="wynikDen"></span>
</div>
</div>
</div>


<div class="box">
<h2>dodawanie ułamków</h2>

<div class="fraction">
<input id="a"><span class="line"></span>
<input id="b">
</div>

+

<div class="fraction">
<input id="c"><span class="line"></span>
<input id="d">
</div>

<br>
<button onclick="dodaj()">dodaj</button>

<div class="result">
<div class="fraction">
<span id="wynikNum2"></span>
<span class="line"></span>
<span id="wynikDen2"></span>
</div>
</div>
</div>


<div class="box">
<h2>odejmowanie ułamków</h2>

<div class="fraction">
<input id="e"><span class="line"></span>
<input id="f">
</div>

-

<div class="fraction">
<input id="g"><span class="line"></span>
<input id="h">
</div>

<br>
<button onclick="odejmij()">odejmij</button>

<div class="result">
<div class="fraction">
<span id="wynikNum3"></span>
<span class="line"></span>
<span id="wynikDen3"></span>
</div>
</div>
</div>

</div>

<script>

function nwd(a,b){
    a = Math.abs(a);
    b = Math.abs(b);
    return b==0 ? a : nwd(b, a%b);
}

function sprawdzZero(den){
    if(den==0){
        alert("nie jest możliwe podzielenie liczby przez 0");
        return true;
    }
    return false;
}

function short(){
    let num = parseInt(num1.value);
    let den = parseInt(den1.value);

    if(sprawdzZero(den)) return;

    let dz = nwd(num, den);

    wynikNum.innerText = num/dz;
    wynikDen.innerText = den/dz;
}

function dodaj(){
    let a1 = parseInt(a.value);
    let b1 = parseInt(b.value);
    let c1 = parseInt(c.value);
    let d1 = parseInt(d.value);

    if(sprawdzZero(b1) || sprawdzZero(d1)) return;

    let num = a1*d1 + c1*b1;
    let den = b1*d1;

    let dz = nwd(num, den);

    wynikNum2.innerText = num/dz;
    wynikDen2.innerText = den/dz;
}

function odejmij(){
    let e1 = parseInt(e.value);
    let f1 = parseInt(f.value);
    let g1 = parseInt(g.value);
    let h1 = parseInt(h.value);

    if(sprawdzZero(f1) || sprawdzZero(h1)) return;

    let num = e1*h1 - g1*f1;
    let den = f1*h1;

    let dz = nwd(num, den);

    wynikNum3.innerText = num/dz;
    wynikDen3.innerText = den/dz;
}

</script>

</body>
</html>
